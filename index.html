<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Listen & Pick!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Start Screen -->
  <div id="start-screen" class="screen">
    <div class="start-content">
      <div class="title-emoji">🎧</div>
      <h1>Listen &amp; Pick!</h1>
      <p>Listen to the word and tap the right picture!</p>
      <p class="category-label">Choose a topic:</p>
      <div class="category-picker">
        <button class="btn-cat selected" data-cat="all">⭐ All</button>
        <button class="btn-cat" data-cat="body">🧍 Body</button>
        <button class="btn-cat" data-cat="classroom">🏫 Classroom</button>
        <button class="btn-cat" data-cat="animals">🐾 Animals</button>
        <button class="btn-cat" data-cat="actions">🏃 Actions</button>
      </div>
      <button id="start-btn" class="btn-start">▶ Start!</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen hidden">
    <div id="score-bar">
      <span id="score-text">✓ 0 / 0</span>
    </div>
    <div id="question-area">
      <button id="play-btn" class="btn-play" title="Play again">🔊</button>
    </div>
    <div id="choices"></div>
    <div id="feedback" class="hidden"></div>
  </div>

  <!-- End Screen -->
  <div id="end-screen" class="screen hidden">
    <div class="end-content">
      <div id="end-emoji">🏆</div>
      <h2>Well done!</h2>
      <p id="end-score"></p>
      <div id="missed-section" class="hidden">
        <p class="missed-title">Practice more: 📚</p>
        <div id="missed-list"></div>
      </div>
      <button id="replay-btn" class="btn-start">▶ Play Again!</button>
    </div>
  </div>

  <!-- Floating Controls -->
  <div id="floating-controls">
    <div class="controls-row">
      <button id="fullscreen-btn" title="全螢幕">⛶</button>
      <button id="volume-btn" title="音量">🔊</button>
    </div>
    <div id="volume-slider-wrap" class="hidden">
      <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
    </div>
  </div>

  <!-- iOS Toast -->
  <div id="ios-toast"></div>

  <script src="game.js"></script>
</body>
</html>
